<head>
  <title>Hanzi decomposition</title>
</head>
<body>
  {{> navbar}} {{> modal}} {{> editor}} {{> char_browser}}
</body>

<template name="char_browser">
  <div id="char-browser" class="{{stateClass}}">
    <div class="cb-header">
      <span class="cb-title">Nôm characters ({{filteredCount}} / {{totalCount}})</span>
      <a class="cb-refresh" title="Reload from database">⟳</a>
      <a class="cb-toggle">{{toggleLabel}}</a>
    </div>
    {{#unless collapsed}}
      <div class="cb-controls">
        <input type="text" class="cb-search" placeholder="char or U+XXXX" value="{{search}}">
        <select class="cb-filter">
          <option {{selected filter "all"}}>All</option>
          <option {{selected filter "nom"}}>Nôm only</option>
          <option {{selected filter "components"}}>Components only</option>
          <option {{selected filter "issues"}}>Partial medians</option>
          <option {{selected filter "incomplete"}}>Incomplete</option>
        </select>
      </div>
      <div class="cb-list">
        {{#each entries}}
          <a class="cb-item {{statusClass}}"
             data-char="{{character}}"
             title="{{codepointLabel}} · {{strokeCount}} strokes{{#if hasPartialMedians}} · partial medians{{/if}}{{#unless hasCompleteOrder}} · no order{{/unless}}{{#if componentOnly}} · component only{{/if}}">
            {{character}}
          </a>
        {{/each}}
        {{#unless entries.length}}
          <div class="cb-empty">No matches.</div>
        {{/unless}}
      </div>
    {{/unless}}
  </div>
</template>

<template name="navbar">
  <div id="navbar" class="navbar navbar-default navbar-static-top">
    <div class="container-fluid">
      <div class="navbar-header">
        <div class="navbar-brand">Hanzi decomposition</div>
      </div>
      <div class="progress">
        <div
          class="progress-bar progress-bar-warning active"
          role="progressbar"
          style="width: {{percent}}%"
          aria-valuenow="{{percent}}"
          aria-valuemin="0"
          aria-valuemax="100"
        >
          <span>{{complete}}/{{total}}</span>
        </div>
      </div>
      <div class="navbar-right">
        <div class="backup navbar-brand {{backup}}">&#x270e;</div>
      </div>
    </div>
  </div>
</template>

<template name="modal">
  <div
    id="modal"
    class="modal fade"
    tabindex="2"
    data-backdrop="static"
    data-keyboard="false"
  >
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-body">{{text}}</div>
        <div class="modal-footer">
          <div class="progress">
            <div
              class="progress-bar progress-bar-striped active"
              role="progressbar"
              style="width: {{percent}}%"
              aria-valuenow="{{percent}}"
              aria-valuemin="0"
              aria-valuemax="100"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>

<template name="editor">
  <div id="editor">
    <div class="popup panel panel-primary">shadfbu</div>
    <div class="left-pane">
      {{> metadata}} {{> status}}
      <div class="keybinds panel panel-primary">
        <code>a</code> get previous glyph<br />
        <code>A</code> get previous unverified glyph<br />
        <code>q</code> get previous verified glyph<br />
        <code>d</code> get next glyph<br />
        <code>D</code> get next unverified glyph<br />
        <code>e</code> get next verified glyph<br />
        <code>r</code> reset stage<br />
        <code>s</code> next stage<br />
        <code>t</code> next unverified in Truyện Kiều<br />
        <code>T</code> previous in Truyện Kiều<br />
        <code>w</code> previous stage<br />
        <code>C-click</code> create a point<br />
        <code>1</code>-<code>9</code> open reference<br />
        <code>B</code> toggles this popup<br />
      </div>
    </div>
    <svg viewbox="0 0 1024 1024" style="border: 1px solid">
      <g transform="scale(1, -1) translate(0, -900)">
        {{#each paths}}
        <path
          class="{{cls}}"
          fill="{{fill}}"
          stroke="{{stroke}}"
          d="{{d}}"
        ></path>
        {{/each}} {{#each points}}
        <circle
          class="{{cls}}"
          fill="{{fill}}"
          stroke="{{stroke}}"
          cx="{{cx}}"
          cy="{{cy}}"
          r="8"
        ></circle>
        {{/each}} {{#each lines}}
        <line
          class="{{cls}}"
          stroke="{{stroke}}"
          stroke-width="14"
          x1="{{x1}}"
          y1="{{y1}}"
          x2="{{x2}}"
          y2="{{y2}}"
        ></line>
        {{/each}} {{#each animations}}
        <clipPath id="{{clip}}">
          <path d="{{stroke}}"></path>
        </clipPath>
        <path
          class="animation"
          clip-path="url(#{{clip}})"
          d="{{median}}"
          stroke-dasharray="{{length}} {{spacing}}"
          stroke-dashoffset="{{advance}}"
        />
        {{/each}}
      </g>
    </svg>
  </div>
</template>

<template name="metadata">
  <div class="panel panel-primary metadata" style="display: {{display}};">
    <div class="panel-heading">
      <h3 class="panel-title">
        Metadata for {{rank}} - {{character}} {{#if simplified}} -
        <a href="#{{simplified}}">(simplified: {{simplified}})</a>
        {{/if}} {{#if truyenKieuPosition}}
        <small>• Truyện Kiều {{truyenKieuPosition}}</small>
        {{/if}}
      </h3>
    </div>
    {{#each items}}
    <div class="field">
      <label class="control-label" placeholder="(unknown)">{{label}}</label>
      {{{editable field value}}}{{separator}}{{{extra}}}
    </div>
    {{/each}}
    <div class="field">
      <label class="control-label">
        <input type="checkbox" class="component-only-toggle" {{componentOnlyAttr}}>
        Component only (skip in Nôm export)
      </label>
    </div>
    <div class="field">
      <label class="control-label">References:</label>
      {{#each references}}
      <a class="reference" href="{{href}}" target="_blank">{{label}}</a>
      <div class="separator">•</div>
      {{/each}}
    </div>
  </div>
</template>

<template name="status">
  <div class="panel panel-primary status">
    <div class="panel-heading">
      <h3 class="panel-title">Edit {{stage}}</h3>
    </div>
    <div class="template {{template}}">{{> UI.dynamic template=template}}</div>
    <ul class="log">
      {{#each lines}}
      <li class="line {{cls}}">{{message}}</li>
      {{/each}}
    </ul>
  </div>
</template>
